services:

  # ─────────────────────────────────────────────────────
  #  SSRF Lab 1 — Easy  (Unfiltered cURL)
  #  http://localhost:8081        → Dashboard
  #  http://localhost:8081/lab.php → Lab Guide
  # ─────────────────────────────────────────────────────
  ssrf-easy:
    build: ./ssrf-easy
    container_name: nexus-ssrf-easy
    ports:
      - "8081:80"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  #  SSRF Lab 2 — Medium  (Naive Blocklist Bypass)
  #  http://localhost:8082        → Dashboard
  #  http://localhost:8082/lab.php → Lab Guide
  # ─────────────────────────────────────────────────────
  ssrf-medium:
    build: ./ssrf-medium
    container_name: nexus-ssrf-medium
    ports:
      - "8082:80"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  #  SSRF Lab 3 — Hard  (file:// Protocol Bypass)
  #  http://localhost:8083        → Dashboard
  #  http://localhost:8083/lab.php → Lab Guide
  # ─────────────────────────────────────────────────────
  ssrf-hard:
    build: ./ssrf-hard
    container_name: nexus-ssrf-hard
    ports:
      - "8083:80"
    restart: unless-stopped
